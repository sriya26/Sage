<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage | Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="journal.css" />
  <link rel="stylesheet" href="../journey/chatbot.css" />
</head>
<body>

  <div class="success-message" id="success-message">
    ✅ Successfully submitted!  
  </div>

  <div class="success-message" id="empty-message">
    ❌ Please write something!
  </div>

  <div class="success-message" id="analysing-message">
    ⏳ Analysing...
  </div>

  <!-- Top-right pills: mood stamp + streak -->
  <div class="top-pills">
    <span class="mood-stamp" id="mood-stamp">✦ TODAY</span>
    <span class="streak-pill">
      <span class="streak-dot"></span>
      <span id="streak-count">—</span> day streak
    </span>
  </div>

  <a href="../journey/journey.html" class="home-link">
    <svg class="home-icon" viewBox="0 0 24 24" fill="none" stroke="#254e72" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 12 12 3 21 12"/>
      <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/>
    </svg>
  </a>

  <div class="container">
    <h1 class="title" id="date-heading"></h1>
    <p class="journal-subtitle" id="journal-subtitle"></p>

    <!-- Breathing pulse decoration -->
    <div class="breathing-pulse" aria-hidden="true"></div>

    <form id="journal-form">
      <div class="entry-box">
        <textarea id="journal-entry" placeholder="Write your thoughts here..."></textarea>
        <!-- Image preview area -->
        <div class="img-preview-area" id="img-preview-area">
          <img id="img-preview" class="img-preview" alt="Attached photo" />
          <button type="button" class="img-remove-btn" id="img-remove-btn" title="Remove photo">×</button>
        </div>
        <div class="editor-footer">
          <div class="footer-left">
            <div class="footer-icon" id="voice-btn" title="Voice memo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="3" width="6" height="12" rx="3"/>
                <path d="M5 11a7 7 0 0014 0"/><path d="M12 18v3"/>
              </svg>
            </div>
            <div class="recording-indicator" id="recording-indicator">
              <span class="recording-dot"></span>
              Recording…
            </div>
            <div class="footer-icon" id="img-btn" title="Add photo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="16" rx="2"/>
                <circle cx="9" cy="10" r="2"/>
                <path d="M21 16l-5-5-9 9"/>
              </svg>
            </div>
            <div class="footer-icon" id="bookmark-btn" title="Bookmark this entry">
              <svg id="bookmark-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 4h12v17l-6-4-6 4V4z"/>
              </svg>
            </div>
          </div>
          <span id="word-count"><span class="autosave-dot" id="autosave-dot"></span>0 words</span>
        </div>
      </div>
      <input type="file" id="img-input" accept="image/*" style="display:none">
      <button type="submit" class="submit-button" id="submit-btn">Submit</button>
    </form>

    <img src="../assets/light-blue.PNG" class="decor-left" />
    <img src="../assets/dark-blue.PNG" class="decor-right" />
  </div>

  <!-- Chatbot button -->
  <div class="chatbot-button" title="chatbot">
    <img src="../assets/chatbot-icon.png" alt="Chatbot" class="chatbot-icon" onclick="toggleModal()">
  </div>

  <!-- Chatbot modal -->
  <div class="chatbot-modal" id="chatbotModal">
    <div class="chatbot-header">
      <span>Sage–bot</span>
      <button class="close-btn" onclick="toggleModal()">×</button>
    </div>
    <div class="chatbot-body" id="chatbotBody"></div>
    <div class="chatbot-input-area">
      <input type="text" id="chatInput" placeholder="Enter your message here" />
      <img src="../assets/send.PNG" alt="Send" class="send-icon" id="send-icon" onclick="sendMessage()">
    </div>
  </div>

  <script src="../journey/chatbot.js"></script>
  <script src="journal.js"></script>

</body>
</html>
