<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sage | Start Your Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="journey.css">
</head>
<body>

  <!-- Bottom wave decoration (fixed, above nav) -->
  <!-- viewBox 160 tall + CSS 210px → Y scale 1.3, so blobs expand vertically and look rounder -->
  <svg class="deco-waves" viewBox="0 0 1280 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="0" y="0" width="1280" height="160" fill="#f6f7f6"/>

    <!-- Left blob — stretched further -->
    <path d="M -30 160 L -30 95
             C 10 30, 130 -5, 268 28
             C 410 54, 482 126, 534 156
             C 640 160, 770 160, 770 160 Z" fill="#133855"/>

    <!-- Right blob — lower/shorter height -->
    <path d="M 1310 160 L 1310 132
             C 1270 96, 1168 78, 1058 90
             C 960 100, 886 138, 856 157
             C 848 160, 848 160, 848 160 Z" fill="#133855"/>

    <!-- Mint wave lines in the gap -->
    <path d="M 544 160 C 588 110, 648 92, 695 106 C 744 120, 798 106, 838 160" stroke="#C7E8DC" stroke-width="4" fill="none"/>
    <path d="M 560 160 C 602 132, 662 122, 708 132 C 754 142, 790 152, 838 160" stroke="#C7E8DC" stroke-width="3" fill="none" opacity="0.75"/>

    <!-- Left blob dots — mint blue accent circles -->
    <circle cx="95"  cy="72"  r="4"   fill="#fff"/>
    <circle cx="148" cy="88"  r="2.5" fill="#fff"/>
    <circle cx="46"  cy="96"  r="3"   fill="#C7E8DC"/>
    <circle cx="330" cy="78"  r="3.5" fill="#fff"/>
    <circle cx="448" cy="140" r="2.5" fill="#C7E8DC"/>

    <!-- Right blob dots — mint blue accent circles -->
    <circle cx="860"  cy="78"  r="3"   fill="#fff"/>
    <circle cx="970"  cy="62"  r="3.5" fill="#C7E8DC"/>
    <circle cx="1100" cy="72"  r="2.5" fill="#C7E8DC"/>
    <circle cx="1185" cy="88"  r="3"   fill="#fff"/>
  </svg>

  <!-- Page header: brand + greeting -->
  <div class="page-header">
    <h1 class="title">Sage</h1>
    <div class="greeting">
      <div class="eyebrow" id="greeting-eyebrow"></div>
      <h2 class="greeting-h" id="greeting-name">Good evening.</h2>
      <p class="greeting-sub" id="greeting-sub">What's on your mind today?</p>
    </div>
  </div>

  <!-- Two-column main body -->
  <div class="home-body">

    <!-- Left rail: week calendar + entries + mood chart -->
    <div class="home-main">

      <div id="week-calendar" class="weekcal hidden">
        <div class="weekcal-hd">
          <span id="weekcal-month" class="weekcal-mo"></span>
        </div>
        <div id="weekcal-grid" class="weekcal-grid"></div>
      </div>

      <div id="entries-block" class="entries-block hidden">
        <div class="entries-hd">
          <span class="entries-ttl">Recent entries</span>
        </div>
        <div id="entries-container"></div>
      </div>

      <!-- Mood chart lives in the left column, full width -->
      <div id="mood-chart-section" class="section-card hidden">
        <div class="card-hd">
          <span class="card-ttl">Mood — Last 30 Days</span>
        </div>
        <div class="chart-wrapper">
          <canvas id="moodChart"></canvas>
        </div>
        <div id="mood-legend" class="mood-legend"></div>
      </div>

      <div id="default-section">
        <p class="subtitle">Start your journey</p>
      </div>

    </div>

    <!-- Right rail: compose CTA + insights + weekly report -->
    <div class="home-side">

      <div class="side-card compose-cta">
        <img src="../assets/meditation.PNG" class="compose-illo" alt=""/>
        <span class="compose-label">TODAY</span>
        <h3 class="compose-heading">How are you feeling?</h3>
        <p class="compose-sub">Sage is here to listen.</p>
        <a href="../journal/journal.html" class="write-btn">Write today's entry →</a>
      </div>

      <div id="insights-section" class="side-card hidden">
        <div class="card-hd">
          <span class="card-ttl">Your Patterns</span>
        </div>
        <div id="insights-cards" class="plist"></div>
      </div>

      <div id="weekly-report-section" class="side-card hidden">
        <div class="card-hd">
          <span class="card-ttl">Week in Review</span>
        </div>
        <p id="report-summary" class="report-summary"></p>
        <div id="report-bars" class="report-bars"></div>
      </div>

    </div>
  </div>

  <!-- Fixed chatbot button (unchanged) -->
  <div class="chatbot-button" title="chatbot">
    <img src="../assets/chatbot-icon.png" alt="Chatbot" class="chatbot-icon" onclick="toggleModal()">
  </div>

  <!-- Bottom nav (unchanged) -->
  <div class="bottom-nav">
    <a href="journey.html" class="nav-item" title="Home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#254e72" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 12 12 3 21 12"/>
        <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/>
      </svg>
      <span class="nav-label">Home</span>
    </a>

    <a href="https://open.spotify.com/playlist/2pf4W9bfzSnbxqjaXEQUQy" target="_blank" rel="noopener noreferrer" class="nav-item" title="Playlist">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#254e72" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 18v-6a9 9 0 0118 0v6"/>
        <path d="M3 18a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3v5z"/>
        <path d="M21 18a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3v5z"/>
      </svg>
      <span class="nav-label">Music</span>
    </a>

    <a href="../journal/journal.html" class="nav-item" title="Journal">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#254e72" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        <line x1="9" y1="7" x2="15" y2="7"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
      </svg>
      <span class="nav-label">Journal</span>
    </a>

    <a href="../profile/profile.html" class="nav-item" title="Profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#254e72" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="nav-label">Profile</span>
    </a>
  </div>

  <!-- Chatbot modal (unchanged) -->
  <div class="chatbot-modal" id="chatbotModal">
    <div class="chatbot-header">
      <span>Sage–bot</span>
      <button class="close-btn" onclick="toggleModal()">×</button>
    </div>
    <div class="chatbot-body" id="chatbotBody"></div>
    <div class="chatbot-input-area">
      <input type="text" id="chatInput" placeholder="Enter your message here" />
      <img src="../assets/send.PNG" alt="Send" class="send-icon" id="send-icon" onclick="sendMessage()">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="chatbot.js"></script>
  <script src="journey.js"></script>
</body>
</html>
